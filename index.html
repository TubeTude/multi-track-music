/* ════════════════════════════════════════════════════
   LOAD SAVED TRACKS (project reopen)
════════════════════════════════════════════════════ */
async function loadTrackPairs(pairs) {
  const ctx = await getAudioCtx();
  let loaded = 0;

  for (const p of pairs) {
    // Prefer trackIdx-based placement; fall back to first empty slot
    let idx = (p.trackIdx != null) ? p.trackIdx - 1 : -1;
    if (idx < 0 || idx >= slots.length || slots[idx].drawEl || slots[idx].isCamera) {
      idx = slots.findIndex(s => !s.drawEl && !s.isCamera);
    }
    if (idx === -1) break;

    // Image track — load directly, no audio
    if (p.imagePath) {
      await loadImageIntoSlot(idx, p.imagePath);
      loaded++;
      continue;
    }

    // Video track — convert if needed, then populate slot
    const result = await window.api.convertIfNeeded(p.videoPath);
    if (result.converted) showToast(`Converted: ${p.videoPath.split('/').pop()}`);
    const videoPath = result.path;
    const { audioPath } = p;

    const s = slots[idx];
    s.card.innerHTML=''; s.card.classList.remove('empty','camera-active');

    const vid = document.createElement('video');
    vid.src='file://'+encodeURI(videoPath); vid.loop=false;
    vid.playsInline=true; vid.muted=true; vid.preload='auto';
    vid.onended = () => { vid.currentTime=0; };
    s.card.appendChild(vid); s.videoEl=vid; s.drawEl=vid;
    addTrackBadge(s.card, idx+1);
    refreshVu(s);

    const analyser=ctx.createAnalyser(); analyser.fftSize=256;
    analyser.connect(masterGain); s.analyser=analyser;

    if (audioPath) {
      const ab = await window.api.readFile(audioPath);
      if (ab) {
        try {
          const buf = await ctx.decodeAudioData(ab);
          s.recordedSamples = new Float32Array(buf.getChannelData(0));
          takeCount++;
          if (!loopDuration) { loopDuration=Math.round(buf.duration*1000); }
        } catch(e) { console.error('WAV decode:',e); }
      }
    } else {
      vid.muted=false;
      ctx.createMediaElementSource(vid).connect(analyser);
    }
    loaded++;
  }
  if (loaded) showToast(`${loaded} track${loaded>1?'s':''} loaded`);
  refreshExportBtn();
}

/* ════════════════════════════════════════════════════
   CAMERA
════════════════════════════════════════════════════ */
let activeCameraIdx = -1;

grid.addEventListener('click', e => {
  if (isRecording) return;
  const card = e.target.closest('.track-card');
  if (!card) return;
  const idx = slots.findIndex(s => s.card===card);
  if (idx===-1) return;
  const s = slots[idx];
  if (s.isPending) return;               // overlay buttons handle pending slots
  if (s.isCamera)              deactivateCamera(idx);
  else if (s.recordedSamples)  clearTakeAndActivateCamera(idx);
  else if (!s.drawEl)          activateCamera(idx);
});

async function clearTakeAndActivateCamera(idx) {
  stopPlayback();
  const s = slots[idx];
  if (s.playbackNode) { try{s.playbackNode.stop();}catch(_){} s.playbackNode=null; }
  if (s.analyser)     { s.analyser.disconnect(); s.analyser=null; }
  if (s.videoEl)      { s.videoEl.pause(); s.videoEl=null; }
  s.drawEl=null; s.isImage=false;
  s.recordedSamples=null; takeCount=Math.max(0,takeCount-1);
  s.card.innerHTML='';
  s.card.classList.remove('camera-active','recording-active');
  s.card.classList.add('empty');
  s.card.appendChild(makeTapHint()); refreshVu(s);
  refreshExportBtn();
  await activateCamera(idx);
}

/* ════════════════════════════════════════════════════
   IMAGE SLOTS
════════════════════════════════════════════════════ */
async function loadImageIntoSlot(idx, imagePath) {
  const s = slots[idx];
  s.card.innerHTML = ''; s.card.classList.remove('empty', 'camera-active', 'drag-target');
  const img = document.createElement('img');
  img.src = 'file://' + encodeURI(imagePath);
  img.draggable = false;
  s.card.appendChild(img);
  s.drawEl = img; s.isImage = true;
  addTrackBadge(s.card, idx + 1);
  refreshVu(s);
  refreshExportBtn();
}

/* ════════════════════════════════════════════════════
   DRAG-AND-DROP INTO TRACK CARDS
════════════════════════════════════════════════════ */
const VIDEO_DROP_EXTS = new Set(['mp4','mov','webm','mkv','m4v','avi','ogv','flv','wmv','ts','mts']);
const IMAGE_DROP_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp']);

// Clear all content from a slot without activating camera (used before drop)
function _clearSlotContent(idx) {
  savedSlots[idx] = null; // clear persistent store too
  const s = slots[idx];
  // Adjust takeCount only for confirmed (non-pending) recorded samples
  if (s.recordedSamples && !s.isPending) takeCount = Math.max(0, takeCount - 1);
  stopPlayback();
  if (s.playbackNode) { try{s.playbackNode.stop();}catch(_){} s.playbackNode=null; }
  if (s.cameraStream) { s.cameraStream.getTracks().forEach(t=>t.stop()); s.cameraStream=null; }
  if (s.micSource)    { s.micSource.disconnect(); s.micSource=null; }
  if (s.analyser)     { s.analyser.disconnect(); s.analyser=null; }
  if (s.videoEl)      { s.videoEl.pause(); s.videoEl=null; }
  if (activeCameraIdx === idx) activeCameraIdx = -1;
  s.isCamera=false; s.drawEl=null; s.isImage=false;
  s.recordedSamples=null; s.isPending=false; s.pendingBuffer=null; s.pendingExt=null;
  s.card.innerHTML='';
  s.card.classList.remove('empty','camera-active','recording-active','pending','drag-target');
}

grid.addEventListener('dragover', e => {
  const card = e.target.closest('.track-card');
  if (!card) return;
  const item = e.dataTransfer?.items?.[0];
  if (!item || item.kind !== 'file') return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  card.classList.add('drag-target');
});

grid.addEventListener('dragleave', e => {
  const card = e.target.closest('.track-card');
  if (!card) return;
  // Only remove highlight when leaving the card itself, not a child element
  if (!card.contains(e.relatedTarget)) card.classList.remove('drag-target');
});

grid.addEventListener('drop', async e => {
  const card = e.target.closest('.track-card');
  if (!card) return;
  e.preventDefault();
  card.classList.remove('drag-target');
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const idx = slots.findIndex(s => s.card === card);
  if (idx === -1) return;
  if (isRecording) { showToast('⚠ Stop recording first', true); return; }
  if (VIDEO_DROP_EXTS.has(ext))      await dropVideoIntoSlot(idx, file);
  else if (IMAGE_DROP_EXTS.has(ext)) await dropImageIntoSlot(idx, file);
  else showToast('⚠ Unsupported file type', true);
});

async function dropVideoIntoSlot(idx, file) {
  if (!saveDir) { showToast('⚠ Choose a project folder first', true); return; }
  const ext = file.name.split('.').pop().toLowerCase();
  const destName = `track_${idx+1}_video.${ext}`;
  const destPath = await window.api.pathJoin(saveDir, destName);

  showToast(`Saving ${file.name}…`);
  const ab = await file.arrayBuffer();
  const saved = await window.api.saveFile(destPath, ab);
  if (!saved.ok) { showToast('⚠ Could not save file', true); return; }

  const { path: playPath, converted } = await window.api.convertIfNeeded(destPath);
  if (converted) showToast(`Converted: ${destName}`);

  _clearSlotContent(idx);
  const s = slots[idx];

  const vid = document.createElement('video');
  vid.src = 'file://' + encodeURI(playPath);
  vid.loop=false; vid.playsInline=true; vid.muted=false; vid.preload='auto';
  vid.onended = () => { vid.currentTime=0; };
  s.card.appendChild(vid);
  s.videoEl=vid; s.drawEl=vid; s.isImage=false;

  const ctx = await getAudioCtx();
  const analyser = ctx.createAnalyser(); analyser.fftSize=256;
  ctx.createMediaElementSource(vid).connect(analyser);
  analyser.connect(masterGain);
  s.analyser=analyser;

  addTrackBadge(s.card, idx+1);
  refreshVu(s);
  refreshExportBtn();
  showToast(`✓ Video added to track ${idx+1}`);
}

async function dropImageIntoSlot(idx, file) {
  if (!saveDir) { showToast('⚠ Choose a project folder first', true); return; }
  const ext = file.name.split('.').pop().toLowerCase();
  const destName = `track_${idx+1}_image.${ext}`;
  const destPath = await window.api.pathJoin(saveDir, destName);

  const ab = await file.arrayBuffer();
  const saved = await window.api.saveFile(destPath, ab);
  if (!saved.ok) { showToast('⚠ Could not save image', true); return; }

  _clearSlotContent(idx);
  await loadImageIntoSlot(idx, destPath);
  showToast(`✓ Image added to track ${idx+1}`);
}

async function activateCamera(idx) {
  if (activeCameraIdx>=0) deactivateCamera(activeCameraIdx);
  const s=slots[idx], ctx=await getAudioCtx();
  try {
    // Use selected devices; fall back to defaults
    const videoConstraints = selectedVideoDeviceId
      ? { deviceId:{ exact:selectedVideoDeviceId } }
      : { facingMode:'user', width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30} };
    const audioConstraints = selectedAudioDeviceId
      ? { deviceId:{ exact:selectedAudioDeviceId },
          echoCancellation:false, noiseSuppression:false, autoGainControl:false,
          sampleRate:48000, channelCount:1, latency:0 }
      : { echoCancellation:false, noiseSuppression:false, autoGainControl:false,
          sampleRate:48000, channelCount:1, latency:0 };

    const stream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints, audio: audioConstraints,
    });
    s.card.innerHTML=''; s.card.classList.remove('empty'); s.card.classList.add('camera-active');
    const vid=document.createElement('video');
    vid.srcObject=stream; vid.autoplay=true; vid.muted=true;
    vid.playsInline=true; vid.className='selfie';
    s.card.appendChild(vid); refreshVu(s);

    const micSrc=ctx.createMediaStreamSource(stream);
    const analyser=ctx.createAnalyser(); analyser.fftSize=256;
    micSrc.connect(analyser); analyser.connect(masterGain);

    s.videoEl=vid; // store camera video so FS canvas can draw it
    s.cameraStream=stream; s.micSource=micSrc;
    s.analyser=analyser; s.isCamera=true; activeCameraIdx=idx;
  } catch(err) {
    console.error('Camera:',err); showToast('⚠ Camera/mic denied',true);
    s.card.classList.add('empty'); s.card.appendChild(makeTapHint()); refreshVu(s);
  }
}

function deactivateCamera(idx) {
  const s=slots[idx]; if (!s.isCamera) return;
  s.cameraStream?.getTracks().forEach(t=>t.stop());
  s.micSource?.disconnect();
  Object.assign(s,{cameraStream:null,micSource:null,analyser:null,isCamera:false});
  activeCameraIdx=-1;
  s.card.innerHTML=''; s.card.classList.remove('camera-active');
  s.card.classList.add('empty'); s.card.appendChild(makeTapHint()); refreshVu(s);
}

/* ════════════════════════════════════════════════════
   RECORDING ENGINE
════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════
   FULLSCREEN CANVAS OVERLAY
════════════════════════════════════════════════════ */
let fsActive = false;
let fsTracks = [];  // ordered list of track indices shown in FS
let fsRaf    = null;

// Pixel dimensions of the canvas (set once, matches shell size)
function _fsCvs() { return document.getElementById('fs-canvas'); }

function _resizeFsCanvas() {
  const cvs = _fsCvs(); if (!cvs) return;
  const shell = document.getElementById('shell');
  cvs.width  = shell.offsetWidth  || 390;
  cvs.height = shell.offsetHeight || 844;
}

// Draw one frame of the FS composition
function _drawFsFrame() {
  if (!fsActive) return;
  const cvs = _fsCvs(); if (!cvs) return;
  const W = cvs.width, H = cvs.height;
  const ctx2 = cvs.getContext('2d');
  ctx2.fillStyle = '#000'; ctx2.fillRect(0, 0, W, H);

  const n = fsTracks.length;
  if (n === 0) { fsRaf = requestAnimationFrame(_drawFsFrame); return; }

  // Cell geometry: 1-up / 2-up side-by-side / T (2 top + 1 wide bottom)
  const cells = n === 1
    ? [{ x:0,   y:0,   w:W,   h:H   }]
    : n === 2
    ? [{ x:0,   y:0,   w:W/2, h:H   }, { x:W/2, y:0,   w:W/2, h:H   }]
    : /* 3 — T layout */
      [{ x:0,   y:0,   w:W/2, h:H/2 }, { x:W/2, y:0,   w:W/2, h:H/2 },
       { x:0,   y:H/2, w:W,   h:H/2 }];

  fsTracks.forEach((ti, ci) => {
    const s = slots[ti]; if (!s) return;
    const el = s.videoEl || s.drawEl;
    if (!el) return;
    // Readiness check
    if (el.tagName === 'VIDEO' && !(el.videoWidth > 0)) return;
    if (el.tagName === 'IMG'   && !(el.complete && el.naturalWidth > 0)) return;
    const { x, y, w, h } = cells[ci];
    const ew = el.videoWidth || el.naturalWidth  || w;
    const eh = el.videoHeight|| el.naturalHeight || h;
    const scale = Math.max(w / ew, h / eh);
    const sw = ew * scale, sh = eh * scale;
    ctx2.save();
    ctx2.beginPath(); ctx2.rect(x, y, w, h); ctx2.clip();
    ctx2.drawImage(el, x + (w - sw)/2, y + (h - sh)/2, sw, sh);
    ctx2.restore();
    // subtle track badge
    ctx2.font = '700 9px SF Mono, monospace';
    ctx2.fillStyle = 'rgba(0,0,0,0.55)';
    ctx2.fillRect(x + 6, y + 6, 18, 14);
    ctx2.fillStyle = 'rgba(255,255,255,0.55)';
    ctx2.fillText(ti + 1, x + 9, y + 17);
  });

  fsRaf = requestAnimationFrame(_drawFsFrame);
}

function _openFsOverlay() {
  _resizeFsCanvas();
  document.getElementById('fs-overlay').style.display = 'block';
  fsActive = true;
  if (fsRaf) cancelAnimationFrame(fsRaf);
  _drawFsFrame();
  _syncFsButtons();
}

function _closeFsOverlay() {
  fsActive = false;
  if (fsRaf) { cancelAnimationFrame(fsRaf); fsRaf = null; }
  document.getElementById('fs-overlay').style.display = 'none';
  fsTracks = [];
  _syncFsButtons();
}

function _syncFsButtons() {
  document.querySelectorAll('.mx-solo-btn').forEach((btn, i) => {
    btn.classList.toggle('active', fsActive && fsTracks.includes(i));
  });
  document.querySelectorAll('.mx-add-btn').forEach((btn, i) => {
    btn.classList.toggle('active', fsActive && fsTracks.includes(i));
  });
}

// Eye button: go FS with ONLY this track (or exit if already soloing this track alone)
function setSolo(idx) {
  if (fsActive && fsTracks.length === 1 && fsTracks[0] === idx) {
    _closeFsOverlay();
  } else {
    fsTracks = [idx];
    _openFsOverlay();
  }
}

// + button: ADD this track to the FS composition (or remove if already there)
function fsAddTrack(idx) {
  if (!fsActive) {
    fsTracks = [idx]; _openFsOverlay(); return;
  }
  if (fsTracks.includes(idx)) {
    fsTracks = fsTracks.filter(i => i !== idx);
    if (fsTracks.length === 0) { _closeFsOverlay(); return; }
  } else if (fsTracks.length < 3) {
    fsTracks.push(idx);
  }
  _syncFsButtons();
}

// Tap overlay to exit
document.getElementById('fs-overlay').addEventListener('click', _closeFsOverlay);

/* ════════════════════════════════════════════════════
   PERSISTENT SLOT STORE — survives layout switches
════════════════════════════════════════════════════ */
// Indexed by slot position 0-11; null = empty
const savedSlots = Array(12).fill(null);

function _snapSlot(s) {
  return {
    videoEl: s.videoEl, drawEl: s.drawEl, isImage: s.isImage,
    isCamera: s.isCamera, cameraStream: s.cameraStream,
    micSource: s.micSource, analyser: s.analyser,
    recordedSamples: s.recordedSamples,
    pendingBuffer: s.pendingBuffer, pendingExt: s.pendingExt,
    isPending: s.isPending, playbackNode: s.playbackNode,
  };
}

// Flush current slots[] into savedSlots (only for positions in current layout)
function flushToSaved() {
  slots.forEach((s, i) => {
    const sourceIdx = displaySourceMap[i] ?? i;
    savedSlots[sourceIdx] = (s.videoEl || s.drawEl || s.isCamera) ? _snapSlot(s) : null;
  });
}

// Restore a saved snapshot into a newly-built slot card
function _restoreSnap(snap, s, i, sourceIdx = i) {
  if (!snap) return;
  if (!snap.videoEl && !snap.drawEl && !snap.isCamera) return;
  s.card.innerHTML = ''; s.card.classList.remove('empty');

  if (snap.isCamera && snap.cameraStream) {
    s.card.classList.add('camera-active');
    const vid = document.createElement('video');
    vid.srcObject = snap.cameraStream; vid.autoplay = true;
    vid.muted = true; vid.playsInline = true; vid.className = 'selfie';
    s.card.appendChild(vid);
    s.videoEl = vid;
    s.cameraStream = snap.cameraStream; s.micSource = snap.micSource;
    s.analyser = snap.analyser; s.isCamera = true;
  } else if (snap.isImage && snap.drawEl) {
    s.card.appendChild(snap.drawEl);
    s.drawEl = snap.drawEl; s.isImage = true; s.analyser = snap.analyser;
    addTrackBadge(s.card, sourceIdx + 1);
  } else if (snap.videoEl) {
    if (snap.isPending) s.card.classList.add('pending');
    const shouldResume = isPlaying || !snap.videoEl.paused;
    s.card.appendChild(snap.videoEl);
    s.videoEl = snap.videoEl; s.drawEl = snap.drawEl;
    s.analyser = snap.analyser; s.recordedSamples = snap.recordedSamples;
    s.pendingBuffer = snap.pendingBuffer; s.pendingExt = snap.pendingExt;
    s.isPending = snap.isPending; s.playbackNode = snap.playbackNode;
    addTrackBadge(s.card, sourceIdx + 1);
    if (snap.isPending) {
      const ov = document.createElement('div'); ov.className = 'pending-overlay';
      ov.innerHTML = `<button class="pend-btn pend-redo">↺ Redo</button>
                      <button class="pend-btn pend-keep">✓ Keep</button>`;
      s.card.appendChild(ov);
      ov.querySelector('.pend-keep').addEventListener('click', e => { e.stopPropagation(); confirmTake(i); });
      ov.querySelector('.pend-redo').addEventListener('click', e => { e.stopPropagation(); discardTake(i); });
    }
    if (shouldResume && !snap.isPending) {
      requestAnimationFrame(() => snap.videoEl.play().catch(() => {}));
    }
  }
  refreshVu(s);
}

/* ════════════════════════════════════════════════════
   LIVE LAYOUT SWITCH — preserves ALL slot content
════════════════════════════════════════════════════ */
function switchLayout(newLayout) {
  if (newLayout === currentLayout && slots.length === newLayout.n && !newLayout.asym) return;

  // 1. Flush visible slots into persistent store
  flushToSaved();
  if (!currentLayout.asym) lastFullTrackCount = Math.max(lastFullTrackCount, currentLayout.n);
  const sourceCount = countAvailableSourceTracks(lastFullTrackCount);

  // 2. Rebuild grid skeleton (wipes DOM, resets slots[])
  currentLayout = newLayout;
  if (!newLayout.asym) lastFullTrackCount = newLayout.n;
  displaySourceMap = makeDisplaySourceMap(newLayout, sourceCount);
  buildGrid(newLayout);

  // 3. Restore from savedSlots for every new slot position
  //    This recovers slots 3-5 when returning from T(3) back to 6-grid
  slots.forEach((s, i) => {
    const sourceIdx = displaySourceMap[i] ?? i;
    _restoreSnap(savedSlots[sourceIdx], s, i, sourceIdx);
  });

  // Clamp transient state
  if (activeCameraIdx >= slots.length) activeCameraIdx = -1;
  fsTracks = fsTracks.filter(i => i < slots.length);
  refreshExportBtn();
}

let isRecording=false, isPlaying=false;
let recStartTime=0, playStartTime=0;
let sessionTs='';
let loopDuration=0;
let loopTimer=null, playTimer=null;
let takeCount=0;

function nowTs() {
  const d    = new Date();
  const date = d.toLocaleDateString('en-CA');                          // 2026-05-23
  const time = d.toTimeString().slice(0,8).replace(/:/g,'-');          // 14-30-45
  return `${date}_${time}`;
}
function fmtMs(ms) {
  const cs = Math.floor((ms % 1000) / 10);   // centiseconds (0-99)
  const s  = Math.floor(ms / 1000);
  const m  = Math.floor(s / 60);
  return `${m>0?m+':':'0:'}${String(s%60).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

/* ── Persistent timer tick — 40ms for smooth centisecond updates ── */
const timerDisplay = document.getElementById('timerDisplay');
setInterval(() => {
  let elapsed = 0;
  if (isRecording)    elapsed = Date.now() - recStartTime;
  else if (isPlaying) elapsed = Date.now() - playStartTime;
  const cur   = fmtMs(elapsed);
  const total = loopDuration > 0 ? fmtMs(loopDuration) : '—';
  timerDisplay.textContent = `${cur} / ${total}`;
  timerDisplay.classList.toggle('active', isRecording || isPlaying);
}, 40);

function startVideoRec(stream) {
  const vt=stream.getVideoTracks()[0]; if (!vt) return null;
  const chunks=[];
  const mime=['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm']
              .find(t=>MediaRecorder.isTypeSupported(t))||'';
  const ext=mime.includes('mp4')?'mp4':'webm';
  const mr=new MediaRecorder(new MediaStream([vt]),mime?{mimeType:mime}:{});
  mr.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data);};
  mr.start(200);
  return {
    stop: ()=>new Promise(resolve=>{
      mr.onstop=async()=>{
        const blob=new Blob(chunks,{type:mime||'video/webm'});
        resolve({buffer:await blob.arrayBuffer(),ext,blobUrl:URL.createObjectURL(blob)});
      };
      mr.stop();
    }),
  };
}

function startWavRec(ctx, stream) {
  const at=stream.getAudioTracks()[0]; if (!at) return null;
  const src=ctx.createMediaStreamSource(new MediaStream([at]));
  const node=new AudioWorkletNode(ctx,'wav-recorder');
  src.connect(node); node.port.postMessage('start');
  let _res;
  node.port.onmessage=({data})=>{if(data.type==='done'&&_res){_res(data.samples);_res=null;}};
  return {
    node,
    stop:()=>new Promise(resolve=>{_res=resolve; node.port.postMessage('stop');}),
  };
}

/* ════════════════════════════════════════════════════
   PENDING TAKE — review before saving
════════════════════════════════════════════════════ */
function addTrackBadge(card, num) {
  card.querySelector('.track-badge')?.remove();
  const b = document.createElement('div');
  b.className = 'track-badge'; b.textContent = num;
  card.appendChild(b);
}

async function showPendingTake(idx, blobUrl, buffer, ext, samples) {
  const ctx = await getAudioCtx();
  const s = slots[idx];
  // Stop camera stream that was still running during recording
  if (s.cameraStream) { s.cameraStream.getTracks().forEach(t=>t.stop()); s.cameraStream=null; }
  if (s.micSource)    { s.micSource.disconnect(); s.micSource=null; }
  if (s.analyser)     { s.analyser.disconnect(); s.analyser=null; }
  if (activeCameraIdx===idx) activeCameraIdx=-1;
  s.isCamera=false;

  s.card.innerHTML='';
  s.card.classList.remove('empty','camera-active','recording-active');
  s.card.classList.add('pending');

  const vid=document.createElement('video');
  vid.src=blobUrl; vid.loop=false;
  vid.playsInline=true; vid.muted=true; vid.preload='auto';
  vid.onended=()=>{vid.currentTime=0;};
  s.card.appendChild(vid); s.videoEl=vid; s.drawEl=vid; refreshVu(s);

  const analyser=ctx.createAnalyser(); analyser.fftSize=256;
  analyser.connect(masterGain);
  s.analyser=analyser; s.recordedSamples=samples;
  s.pendingBuffer=buffer; s.pendingExt=ext; s.isPending=true;

  addTrackBadge(s.card, idx+1);

  const ov=document.createElement('div'); ov.className='pending-overlay';
  ov.innerHTML=`<button class="pend-btn pend-redo">↺ Redo</button>
                <button class="pend-btn pend-keep">✓ Keep</button>`;
  s.card.appendChild(ov);
  ov.querySelector('.pend-keep').addEventListener('click', e=>{e.stopPropagation(); confirmTake(idx);});
  ov.querySelector('.pend-redo').addEventListener('click', e=>{e.stopPropagation(); discardTake(idx);});
  refreshExportBtn();
}

async function confirmTake(idx) {
  const s=slots[idx]; if(!s.isPending) return;
  s.card.querySelector('.pending-overlay')?.remove();
  s.card.classList.remove('pending');
  s.isPending=false; takeCount++;

  const fname=`track_${idx+1}`;
  const saves=[];
  if (s.pendingBuffer && s.pendingExt) {
    const fp=await window.api.pathJoin(saveDir,`${fname}_video.${s.pendingExt}`);
    saves.push(window.api.saveFile(fp,s.pendingBuffer).then(r=>r.ok?fp:null));
  }
  if (s.recordedSamples) {
    const fp=await window.api.pathJoin(saveDir,`${fname}_audio.wav`);
    saves.push(window.api.saveFile(fp,encodeWAV(s.recordedSamples,audioCtx.sampleRate)).then(r=>r.ok?fp:null));
  }
  s.pendingBuffer=null; s.pendingExt=null;
  try {
    const ok=(await Promise.all(saves)).filter(Boolean).length;
    showToast(ok?`✓ Track ${idx+1} saved`:'⚠ Save failed',!ok);
  } catch(e){ console.error(e); showToast('⚠ Save error',true); }
  refreshExportBtn();
}

async function discardTake(idx) {
  const s=slots[idx]; if(!s.isPending) return;
  if(s.playbackNode){try{s.playbackNode.stop();}catch(_){}s.playbackNode=null;}
  if(s.analyser){s.analyser.disconnect();s.analyser=null;}
  if(s.videoEl){s.videoEl.pause();s.videoEl=null;}
  s.recordedSamples=null; s.pendingBuffer=null; s.pendingExt=null; s.isPending=false;
  s.card.innerHTML='';
  s.card.classList.remove('pending','camera-active','recording-active');
  s.card.classList.add('empty');
  s.card.appendChild(makeTapHint()); refreshVu(s);
  refreshExportBtn();
  await activateCamera(idx);
}

/* ════════════════════════════════════════════════════
   PLAYBACK  — one-shot, auto-stops at loopDuration
════════════════════════════════════════════════════ */
async function startPlayback(opts = {}) {
  const ctx=await getAudioCtx();
  const startAt = opts.startAt ?? 0;
  const videoEls = opts.videoEls || slots.filter(s => s.videoEl && !s.isCamera).map(s => s.videoEl);
  const videoDelayMs = Math.max(0, (startAt - ctx.currentTime) * 1000);
  // Always play videos silently for the visual
  const playVideos = () => {
    videoEls.forEach(videoEl => {
      if (!videoEl) return;
      const targetOffset = startAt ? Math.max(0, ctx.currentTime - startAt) : 0;
      try { videoEl.playbackRate = 1; } catch(_) {}
      videoEl.currentTime = targetOffset;
      videoEl.play().catch(()=>{});
    });
  };
  if (videoDelayMs > 4) setTimeout(playVideos, videoDelayMs);
  else playVideos();
  if (mixdownBuffer) {
    // Mixdown overrides all track audio
    if(mixdownNode){try{mixdownNode.stop();}catch(_){}mixdownNode=null;}
    const node=ctx.createBufferSource();
    node.buffer=mixdownBuffer; node.loop=false;
    node.connect(masterGain); node.start(startAt || 0);
    mixdownNode=node;
  } else {
    slots.forEach(s=>{
      if (s.recordedSamples&&s.analyser) {
        if(s.playbackNode){try{s.playbackNode.stop();}catch(_){}s.playbackNode=null;}
        const buf=ctx.createBuffer(1,s.recordedSamples.length,ctx.sampleRate);
        buf.getChannelData(0).set(s.recordedSamples);
        const node=ctx.createBufferSource();
        node.buffer=buf; node.loop=false;
        node.connect(s.analyser); node.start(startAt || 0);
        s.playbackNode=node;
      }
    });
  }
  playStartTime=Date.now(); isPlaying=true;
  document.getElementById('btnPlay').classList.add('playing');
  const dur = mixdownBuffer ? Math.round(mixdownBuffer.duration*1000) : loopDuration;
  if (dur>0) {
    if(playTimer)clearTimeout(playTimer);
    playTimer=setTimeout(()=>stopPlayback(), dur);
  }
}

function stopPlayback() {
  if(playTimer){clearTimeout(playTimer);playTimer=null;}
  slots.forEach(s=>{
    if(s.videoEl&&!s.isCamera){
      try { s.videoEl.playbackRate = 1; } catch(_) {}
      s.videoEl.pause();s.videoEl.currentTime=0;
    }
    if(s.playbackNode){try{s.playbackNode.stop();}catch(_){}s.playbackNode=null;}
  });
  if(mixdownNode){try{mixdownNode.stop();}catch(_){}mixdownNode=null;}
  isPlaying=false;
  document.getElementById('btnPlay').classList.remove('playing');
}

/* ════════════════════════════════════════════════════
   RECORD
════════════════════════════════════════════════════ */
async function startRecording() {
  if (!saveDir) { showToast('⚠ Choose a save folder first',true); return false; }
  if (slots.some(s => s.isPending)) { showToast('⚠ Keep or redo pending takes first',true); return false; }
  const ctx=await getAudioCtx();
  sessionTs=nowTs();
  await startPlayback();

  let camCount=0;
  for (let i=0;i<slots.length;i++) {
    const s=slots[i];
    if(!s.isCamera||!s.cameraStream) continue;
    camCount++;
    s.videoRec=startVideoRec(s.cameraStream);
    s.wavRec=startWavRec(ctx,s.cameraStream);
    s.card.classList.remove('camera-active'); s.card.classList.add('recording-active');
  }
  if (camCount===0) {
    stopPlayback(); showToast('⚠ Tap a slot to add your camera',true); return false;
  }
  recStartTime=Date.now();
  if (loopDuration>0) {
    if(loopTimer)clearTimeout(loopTimer);
    loopTimer=setTimeout(async()=>{
      if(!isRecording)return;
      isRecording=false;
      document.getElementById('btnRecord').classList.remove('recording');
      await stopRecording();
    }, loopDuration);
  }
  return true;
}

async function stopRecording() {
  if(loopTimer){clearTimeout(loopTimer);loopTimer=null;}
  if (!loopDuration) loopDuration=Date.now()-recStartTime;
  stopPlayback();

  const jobs=[];
  for (let i=0;i<slots.length;i++) {
    const s=slots[i];
    if(!s.isCamera||(!s.videoRec&&!s.wavRec)) continue;
    const slotIdx=i;
    const vr=s.videoRec; s.videoRec=null;
    const wr=s.wavRec;   s.wavRec=null;
    jobs.push(
      Promise.all([vr?vr.stop():Promise.resolve(null), wr?wr.stop():Promise.resolve(null)])
      .then(async([vRes,samples])=>{
        if(wr) wr.node?.disconnect();
        if(vRes && samples)
          await showPendingTake(slotIdx, vRes.blobUrl, vRes.buffer, vRes.ext, samples);
      })
    );
  }
  try {
    await Promise.all(jobs);
    const n=slots.filter(s=>s.isPending).length;
    if(n) showToast(`Review take${n>1?'s':''} — tap ✓ to keep`);
  } catch(e){ console.error(e); showToast('⚠ Error processing take',true); }
}

/* ════════════════════════════════════════════════════
   TRANSPORT BUTTONS
════════════════════════════════════════════════════ */
document.getElementById('btnRecord').addEventListener('click', async()=>{
  if (isRecording) {
    isRecording=false;
    document.getElementById('btnRecord').classList.remove('recording');
    await stopRecording();
  } else {
    const ok=await startRecording();
    isRecording=ok;
    document.getElementById('btnRecord').classList.toggle('recording',ok);
  }
});
document.getElementById('btnPlay').addEventListener('click', async()=>{
  if(isPlaying) stopPlayback();
  else await startPlayback();
});

/* ════════════════════════════════════════════════════
   EXPORT REEL  (live window capture + audio)
════════════════════════════════════════════════════ */
let isExporting = false;
const btnExport = document.getElementById('btnExport');

function refreshExportBtn() {
  const hasTracks = slots.some(s => s.recordedSamples || (s.drawEl && !s.isCamera));
  const dis = !hasTracks || isExporting;
  btnExport.disabled = dis;
  const mxBtn = document.getElementById('mxBtnExport');
  if (mxBtn) mxBtn.style.opacity = dis ? '0.28' : '1';
}

async function exportReel() {
  if (isExporting) return;
  if (!slots.some(s => s.drawEl && !s.isCamera)) {
    showToast('⚠ No tracks to export', true); return;
  }
  if (!saveDir) { showToast('⚠ Choose a save folder first', true); return; }
  if (isRecording || isPlaying) { showToast('⚠ Stop playback first', true); return; }

  isExporting = true;
  btnExport.classList.add('exporting');
  btnExport.disabled = true;

  const exportBarEl  = document.getElementById('mxExportBar');
  const exportFillEl = document.getElementById('mxExportFill');
  exportBarEl.classList.add('visible');
  exportFillEl.style.width = '0%';

  const dur    = mixdownBuffer ? Math.round(mixdownBuffer.duration * 1000) : (loopDuration || 5000);
  const estSec = Math.ceil(dur / 1000);
  showToast(`Exporting… ~${estSec}s`);

  const progStart    = Date.now();
  const progInterval = setInterval(() => {
    exportFillEl.style.width = Math.min(((Date.now() - progStart) / dur) * 92, 92) + '%';
  }, 80);

  // Resources to clean up in finally
  let canvasStream = null, audioDest = null, mr = null, cvs = null, actx = null;
  let drawActive = false;
  let exportStartAt = 0;
  let lastVideoSyncAt = 0;

  const cleanup = () => {
    drawActive = false;
    try { document.querySelectorAll('video').forEach(v => { v.playbackRate = 1; }); } catch(_) {}
    try { mr?.state !== 'inactive' && mr?.stop(); } catch(_) {}
    canvasStream?.getTracks().forEach(t => t.stop());
    try { audioDest && masterGain.disconnect(audioDest); } catch(_) {}
    stopPlayback();
    clearInterval(progInterval);
    exportFillEl.style.width = '0%';
    exportBarEl.classList.remove('visible');
    btnExport.classList.remove('exporting');
    isExporting = false;
    refreshExportBtn();
  };

  try {
    // ── 1. Build 1080×1920 composite canvas (no screen-recording needed) ──
    const OUT_W = 1080, OUT_H = 1920;
    cvs = document.createElement('canvas');
    cvs.width  = OUT_W;
    cvs.height = OUT_H;
    const ctx = cvs.getContext('2d');

    const { cols: lCols, rows: lRows } = currentLayout;
    const exportVideoEls = slots
      .filter(s => s.drawEl && !s.isCamera && s.drawEl.tagName === 'VIDEO')
      .map(s => s.drawEl);

    async function primeVideoForExport(videoEl) {
      if (!videoEl) return;
      videoEl.pause();
      try { videoEl.playbackRate = 1; } catch(_) {}
      videoEl.preload = 'auto';
      await new Promise(resolve => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          videoEl.removeEventListener('seeked', finish);
          videoEl.removeEventListener('loadeddata', finish);
          resolve();
        };
        videoEl.addEventListener('seeked', finish, { once: true });
        videoEl.addEventListener('loadeddata', finish, { once: true });
        try { videoEl.currentTime = 0; } catch(_) {}
        if (videoEl.readyState >= 2) finish();
        setTimeout(finish, 650);
      });
    }

    await Promise.all(exportVideoEls.map(primeVideoForExport));
    const exportFrameCache = new WeakMap();

    // Returns true when el has a decoded frame ready to draw
    function isDrawable(el) {
      if (!el) return false;
      if (el.tagName === 'VIDEO') return el.readyState >= 2;
      if (el.tagName === 'IMG')   return el.complete && el.naturalWidth > 0;
      return true;
    }

    function drawCoverIntoCell(el, x, y, w, h) {
      const drawable = isDrawable(el);
      let source = el;

      if (drawable && el.tagName === 'VIDEO') {
        const vw = el.videoWidth || 0;
        const vh = el.videoHeight || 0;
        if (vw > 0 && vh > 0) {
          let cache = exportFrameCache.get(el);
          if (!cache || cache.canvas.width !== vw || cache.canvas.height !== vh) {
            cache = { canvas: document.createElement('canvas') };
            cache.canvas.width = vw;
            cache.canvas.height = vh;
            cache.ctx = cache.canvas.getContext('2d');
            exportFrameCache.set(el, cache);
          }
          try {
            cache.ctx.drawImage(el, 0, 0, vw, vh);
            source = cache.canvas;
          } catch(_) {}
        }
      } else if (!drawable && el.tagName === 'VIDEO') {
        const cache = exportFrameCache.get(el);
        if (!cache) return;
        source = cache.canvas;
      } else if (!drawable) {
        return;
      }

      const ew = source.videoWidth || source.naturalWidth || source.width || w;
      const eh = source.videoHeight || source.naturalHeight || source.height || h;
      const scale = Math.max(w / ew, h / eh);
      const sw = ew * scale, sh = eh * scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.drawImage(source, x + (w - sw) / 2, y + (h - sh) / 2, sw, sh);
      ctx.restore();
    }

    function getFullscreenExportCells(n) {
      if (n === 1) return [{ x: 0, y: 0, w: OUT_W, h: OUT_H }];
      if (n === 2) return [
        { x: 0,         y: 0, w: OUT_W / 2, h: OUT_H },
        { x: OUT_W / 2, y: 0, w: OUT_W / 2, h: OUT_H },
      ];
      return [
        { x: 0,         y: 0,         w: OUT_W / 2, h: OUT_H / 2 },
        { x: OUT_W / 2, y: 0,         w: OUT_W / 2, h: OUT_H / 2 },
        { x: 0,         y: OUT_H / 2, w: OUT_W,     h: OUT_H / 2 },
      ];
    }

    // Draw one frame: cover-fit each track into its explicit grid cell
    // Image tracks draw their <img> element; video tracks draw <video>.
    // Asymmetric layouts use s.gridCell for exact canvas coordinates.
    function drawFrame() {
      if (!drawActive) return;
      const elapsedSec = exportStartAt ? Math.max(0, actx.currentTime - exportStartAt) : 0;
      if (exportStartAt && elapsedSec - lastVideoSyncAt > 0.45) {
        lastVideoSyncAt = elapsedSec;
        exportVideoEls.forEach(videoEl => {
          if (!videoEl || videoEl.seeking) return;
          const maxTime = Number.isFinite(videoEl.duration) && videoEl.duration > 0
            ? Math.max(0, videoEl.duration - 0.04)
            : elapsedSec;
          const target = Math.min(elapsedSec, maxTime);
          const drift = videoEl.currentTime - target;
          if (Math.abs(drift) > 0.75) {
            try { videoEl.currentTime = target; } catch(_) {}
          } else {
            const rate = Math.max(0.94, Math.min(1.06, 1 - drift * 0.14));
            try { videoEl.playbackRate = rate; } catch(_) {}
          }
        });
      }
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, OUT_W, OUT_H);

      // Use fullscreen composition when active; otherwise fall back to the layout grid.
      if (fsTracks?.length > 0) {
        const fsCells = getFullscreenExportCells(Math.min(fsTracks.length, 3));
        fsTracks.slice(0, 3).forEach((trackIdx, cellIdx) => {
          const el = slots[trackIdx]?.drawEl;
          if (!el || slots[trackIdx]?.isCamera) return;
          const { x, y, w, h } = fsCells[cellIdx];
          drawCoverIntoCell(el, x, y, w, h);
        });
      } else if (soloIdx >= 0 && slots[soloIdx]?.drawEl) {
        drawCoverIntoCell(slots[soloIdx].drawEl, 0, 0, OUT_W, OUT_H);
      } else {
        const drawableSlots = slots.filter(s => s.drawEl && !s.isCamera);
        if (drawableSlots.length === 2) {
          const twoUpCells = getFullscreenExportCells(2);
          drawableSlots.forEach((s, cellIdx) => {
            const { x, y, w, h } = twoUpCells[cellIdx];
            drawCoverIntoCell(s.drawEl, x, y, w, h);
          });
          requestAnimationFrame(drawFrame);
          return;
        }

        drawableSlots.forEach(s => {
          const el = s.drawEl;
          // Use explicit cell geometry — correct for both uniform and asymmetric layouts
          const { col, row, cSpan, rSpan } = s.gridCell;
          const dx = (col  / lCols) * OUT_W;
          const dy = (row  / lRows) * OUT_H;
          const dw = (cSpan / lCols) * OUT_W;
          const dh = (rSpan / lRows) * OUT_H;
          drawCoverIntoCell(el, dx, dy, dw, dh);
        });
      }
      requestAnimationFrame(drawFrame);
    }

    // ── 2. Audio tap ──
    actx = await getAudioCtx();
    audioDest   = actx.createMediaStreamDestination();
    masterGain.connect(audioDest);

    // ── 3. Start draw loop then capture stream ──
    drawActive = true;
    drawFrame();
    canvasStream = cvs.captureStream(30);

    // ── 4. MediaRecorder on canvas + audio ──
    const mime = ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm']
                  .find(t => MediaRecorder.isTypeSupported(t)) || '';
    const ext  = mime.includes('mp4') ? 'mp4' : 'webm';
    const chunks = [];
    mr = new MediaRecorder(
      new MediaStream([canvasStream.getVideoTracks()[0], audioDest.stream.getAudioTracks()[0]].filter(Boolean)),
      mime ? { mimeType: mime } : {}
    );
    mr.ondataavailable = e => { if (e.data?.size > 0) chunks.push(e.data); };
    mr.start(200);

    // ── 5. Play and record ──
    exportStartAt = actx.currentTime + 0.18;
    await startPlayback({ startAt: exportStartAt, videoEls: exportVideoEls });
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
    await new Promise(r => setTimeout(r, dur + 580));

    // ── 6. Stop capture ──
    drawActive = false;
    exportVideoEls.forEach(videoEl => { try { videoEl.playbackRate = 1; } catch(_) {} });
    stopPlayback();
    masterGain.disconnect(audioDest); audioDest = null;
    canvasStream.getTracks().forEach(t => t.stop()); canvasStream = null;

    const buffer = await new Promise((resolve, reject) => {
      const t = setTimeout(() => reject(new Error('MediaRecorder stop timeout')), 8000);
      mr.onstop = async () => {
        clearTimeout(t);
        resolve(await new Blob(chunks, { type: mime || 'video/webm' }).arrayBuffer());
      };
      mr.stop();
    });

    // ── 7. Save to exports/ subfolder ──
    const exportsDir = await window.api.pathJoin(saveDir, 'exports');
    await window.api.ensureDir(exportsDir);
    const filename = `reel_${nowTs()}.${ext}`;
    const fp       = await window.api.pathJoin(exportsDir, filename);
    const saved    = await window.api.saveFile(fp, buffer);

    clearInterval(progInterval);
    exportFillEl.style.width = '100%';
    setTimeout(() => { exportBarEl.classList.remove('visible'); exportFillEl.style.width = '0%'; }, 700);

    showToast(saved?.ok
      ? `✓ exports/${filename}  ${OUT_W}×${OUT_H}`
      : '⚠ Save failed', !saved?.ok);

  } catch(err) {
    console.error('Export error:', err);
    showToast(`⚠ Export failed: ${err.message}`, true);
  } finally {
    cleanup();
  }
}

btnExport.addEventListener('click', exportReel);

/* ════════════════════════════════════════════════════
   MIXDOWN OVERRIDE
════════════════════════════════════════════════════ */
let mixdownBuffer = null;
let mixdownNode   = null;
const mixdownDrop  = document.getElementById('mixdownDrop');
const mixdownLabel = document.getElementById('mixdownLabel');
const mixdownClear = document.getElementById('mixdownClear');

async function loadMixdown(file) {
  const ctx = await getAudioCtx();
  try {
    const ab  = await file.arrayBuffer();
    mixdownBuffer = await ctx.decodeAudioData(ab);
    mixdownDrop.classList.add('loaded');
    mixdownLabel.textContent = file.name;
    showToast('✓ Mixdown loaded');
  } catch(e) {
    console.error('Mixdown decode:', e);
    showToast('⚠ Could not decode audio', true);
  }
}

mixdownDrop.addEventListener('dragover', e => {
  e.preventDefault(); mixdownDrop.classList.add('drag-over');
});
mixdownDrop.addEventListener('dragleave', () => {
  mixdownDrop.classList.remove('drag-over');
});
mixdownDrop.addEventListener('drop', e => {
  e.preventDefault(); mixdownDrop.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadMixdown(file);
});

mixdownClear.addEventListener('click', e => {
  e.stopPropagation();
  if (mixdownNode) { try { mixdownNode.stop(); } catch(_) {} mixdownNode = null; }
  mixdownBuffer = null;
  mixdownDrop.classList.remove('loaded');
  mixdownLabel.textContent = 'Drop Mixdown';
});

/* ════════════════════════════════════════════════════
   MIXER LEFT PANEL — EQ · COMP · REVERB · VOLUME
════════════════════════════════════════════════════ */
const MX_SEGS = 18;
let mxTrackCount = 4; // updated when user confirms layout

// Per-track processor chain: analyser → eq → parallelComp → convReverb → gain → master
const trackFx = []; // { eq, comp, compDry, compWet, compMix, revConv, revWet, revDry, revMix, gain }

// ── Generate convolution impulse response (reverb tail) ───────────────────
function buildImpulse(ctx, duration = 2.2, decay = 2.8) {
  const sr     = ctx.sampleRate;
  const length = Math.floor(sr * duration);
  const buf    = ctx.createBuffer(2, length, sr);
  for (let c = 0; c < 2; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < length; i++) {
      // Exponential decay of white noise → natural room tail
      ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return buf;
}

// ── Create / reuse FX chain for one track ─────────────────────────────────
async function ensureTrackFx(idx) {
  if (!audioCtx) return null;
  if (trackFx[idx]) return trackFx[idx];

  // ─ EQ ─
  const eq = audioCtx.createBiquadFilter();
  eq.type = 'peaking'; eq.frequency.value = 1000; eq.Q.value = 1; eq.gain.value = 0;

  // ─ Parallel compression: dry + compressed → mix ─
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value = -24; comp.knee.value = 6;
  comp.ratio.value = 8;       comp.attack.value = 0.002;
  comp.release.value = 0.12;
  const compDry = audioCtx.createGain(); compDry.gain.value = 1;
  const compWet = audioCtx.createGain(); compWet.gain.value = 0; // knob=0 → dry only
  const compMix = audioCtx.createGain(); compMix.gain.value = 1;

  eq.connect(compDry); compDry.connect(compMix);
  eq.connect(comp);    comp.connect(compWet); compWet.connect(compMix);

  // ─ Convolver reverb: dry + wet → mix ─
  const revConv = audioCtx.createConvolver();
  revConv.buffer = buildImpulse(audioCtx, 2.2, 2.8);
  const revDry = audioCtx.createGain(); revDry.gain.value = 1;
  const revWet = audioCtx.createGain(); revWet.gain.value = 0; // knob=0 → dry only
  const revMix = audioCtx.createGain(); revMix.gain.value = 1;

  compMix.connect(revDry);  revDry.connect(revMix);
  compMix.connect(revConv); revConv.connect(revWet); revWet.connect(revMix);

  // ─ Output gain → master ─
  const gain = audioCtx.createGain(); gain.gain.value = 0.8;
  revMix.connect(gain);
  gain.connect(masterGain);

  const fx = { eq, comp, compDry, compWet, compMix, revConv, revWet, revDry, revMix, gain };
  trackFx[idx] = fx;

  // Reconnect this slot's analyser into our chain
  const s = slots[idx];
  if (s && s.analyser) {
    try { s.analyser.disconnect(); } catch(_) {}
    s.analyser.connect(eq);
    eq.connect(comp); // main chain entry already wired above
  }
  return fx;
}

// ── Apply EQ (gain in dB, -15 to +15) ─────────────────────────────────────
async function applyEq(idx, dbGain) {
  const fx = await ensureTrackFx(idx);
  if (!fx) return;
  fx.eq.gain.setTargetAtTime(dbGain, audioCtx.currentTime, 0.02);
}

// ── Apply Compression (0=dry, 1=fully parallel-compressed) ────────────────
async function applyComp(idx, amount) {
  const fx = await ensureTrackFx(idx);
  if (!fx) return;
  // Blend dry ↔ compressed; also tighten threshold for more punch at higher values
  const t = audioCtx.currentTime;
  fx.compWet.gain.setTargetAtTime(amount,             t, 0.02);
  fx.compDry.gain.setTargetAtTime(1 - amount * 0.5,   t, 0.02); // keep some dry punch
  // threshold: -12 dB (light) → -40 dB (heavy brick-wall) as knob increases
  fx.comp.threshold.setTargetAtTime(-12 - amount * 28, t, 0.02);
}

// ── Apply Reverb (0=dry, 1=lush room) ─────────────────────────────────────
async function applyReverb(idx, wet) {
  const fx = await ensureTrackFx(idx);
  if (!fx) return;
  const t = audioCtx.currentTime;
  fx.revWet.gain.setTargetAtTime(wet,           t, 0.05); // smooth fade-in
  fx.revDry.gain.setTargetAtTime(1 - wet * 0.5, t, 0.05); // preserve presence
}

// ── Apply Volume ──────────────────────────────────────────────────────────
async function applyVolume(idx, value) {
  const fx = await ensureTrackFx(idx);
  if (!fx) return;
  fx.gain.gain.setTargetAtTime(value, audioCtx.currentTime, 0.02);
}

// ── Knob helper ───────────────────────────────────────────────────────────
function makeKnobDraggable(el, onChange) {
  let startY = 0, startVal = 0;
  const readVal = () => {
    const raw = parseFloat(el.dataset.val);
    return Number.isFinite(raw) ? raw : 50;
  };
  function setVal(v) {
    v = Math.max(0, Math.min(100, v));
    el.dataset.val = v;
    el.classList.toggle('cleared', v === 0);
    el.style.setProperty('--knob-rot', (-135 + (v / 100) * 270) + 'deg');
    onChange(v / 100);
  }
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    startY = e.clientY; startVal = readVal();
    const move = ev => setVal(startVal - (ev.clientY - startY) * 0.6);
    const up   = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
  setVal(readVal());
}

// ── Custom vertical fader (drag-based, analog style) ─────────────────────
function makeCustomFader(wrapEl, initVal, onChange) {
  const CAP_H  = 9;   // px, must match CSS .mx-fader-cap height
  const MARGIN = 3;   // must match CSS .mx-fader-track top/bottom
  let value = initVal;

  const track = document.createElement('div'); track.className = 'mx-fader-track';
  const cap   = document.createElement('div'); cap.className   = 'mx-fader-cap';
  wrapEl.appendChild(track);
  wrapEl.appendChild(cap);

  function setPos() {
    const wrapH = wrapEl.offsetHeight || 68;
    const range = wrapH - MARGIN * 2 - CAP_H;
    cap.style.top = (MARGIN + (1 - value / 100) * range) + 'px';
  }

  function setVal(v) {
    value = Math.max(0, Math.min(100, v));
    setPos();
    onChange(value / 100);
  }

  let startY = 0, startVal = 0;
  cap.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startY = e.clientY; startVal = value;
    const move = ev => setVal(startVal - (ev.clientY - startY) * 0.9);
    const up   = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });

  // Re-calculate position after layout settles
  requestAnimationFrame(setPos);
  return { setVal };
}

function buildMixerStrips(n) {
  const container = document.getElementById('mxStrips');
  container.innerHTML = '';
  container.classList.toggle('many', n >= 7);

  for (let i = 0; i < n; i++) {
    const strip = document.createElement('div');
    strip.className = 'mx-strip';

    // ── Top row: [👁 Eye] [+ Add to FS] ──────────────────────────────────
    const topRow = document.createElement('div');
    topRow.className = 'mx-strip-top';

    // Eye — enters FS with ONLY this track
    const soloBtn = document.createElement('button');
    soloBtn.className = 'mx-solo-btn';
    soloBtn.title = 'Fullscreen (tap again to exit)';
    soloBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>`;
    soloBtn.addEventListener('click', () => setSolo(i));

    // + — adds this track to the current FS composition
    const addBtn = document.createElement('button');
    addBtn.className = 'mx-add-btn';
    addBtn.title = 'Add to fullscreen view';
    addBtn.textContent = '+';
    addBtn.addEventListener('click', () => fsAddTrack(i));

    topRow.appendChild(soloBtn);
    topRow.appendChild(addBtn);

    // ── Track number ─────────────────────────────────────────────────────
    const num = document.createElement('div');
    num.className = 'mx-track-num';
    num.textContent = String(i + 1).padStart(2, '0');

    // ── VU bar graph ─────────────────────────────────────────────────────
    const bars = document.createElement('div');
    bars.className = 'mx-bars'; bars.id = `mx-bars-${i}`;
    for (let s = 0; s < MX_SEGS; s++) {
      const seg = document.createElement('div'); seg.className = 'mx-bar-seg';
      bars.appendChild(seg);
    }

    // ── Mini knobs ───────────────────────────────────────────────────────
    const miniKnobs = document.createElement('div'); miniKnobs.className = 'mx-mini-knobs';
    const knobDefs = [
      { cls: 'eq-knob',  def: 0, title: 'EQ cleared',          cb: v => applyEq(i, v * 15) },
      { cls: 'cmp-knob', def: 0, title: 'Compression cleared', cb: v => applyComp(i, v) },
      { cls: 'rev-knob', def: 0, title: 'Reverb cleared',      cb: v => applyReverb(i, v) },
    ];
    knobDefs.forEach(({ cls, def, title, cb }) => {
      const knob = document.createElement('div');
      knob.className = `mx-mini-knob ${cls}`; knob.dataset.val = def;
      knob.title = title;
      makeKnobDraggable(knob, cb);
      miniKnobs.appendChild(knob);
    });

    // ── Fader + label ─────────────────────────────────────────────────────
    const faderWrap = document.createElement('div'); faderWrap.className = 'mx-fader-wrap';
    makeCustomFader(faderWrap, 80, v => applyVolume(i, v));

    const label = document.createElement('div');
    const sourceIdx = displaySourceMap[i] ?? i;
    label.className = 'mx-track-label'; label.textContent = `T${sourceIdx + 1}`;

    strip.appendChild(topRow);
    strip.appendChild(num);
    strip.appendChild(bars);
    strip.appendChild(miniKnobs);
    strip.appendChild(faderWrap);
    strip.appendChild(label);
    container.appendChild(strip);
  }
}

// ── Mixer live layout bar ─────────────────────────────────────────────────
function buildMxLayoutBar() {
  const bar = document.getElementById('mxLayoutBar');
  if (!bar) return;
  bar.innerHTML = '';
  LAYOUTS.forEach(layout => {
    const btn = document.createElement('button');
    btn.className = 'mx-layout-opt' + (layout === currentLayout ? ' active' : '');
    btn.title = `${layout.label} tracks`;

    const icon = document.createElement('div');
    icon.className = 'ml-icon';
    icon.style.gridTemplateColumns = `repeat(${layout.cols}, 3.5px)`;
    icon.style.gridTemplateRows    = `repeat(${layout.rows}, 4px)`;
    icon.style.gap = '1.5px';
    layout.cells.forEach(cell => {
      const d = document.createElement('div'); d.className = 'ml-dot';
      d.style.gridColumn = `${cell.col + 1} / span ${cell.cSpan}`;
      d.style.gridRow    = `${cell.row + 1} / span ${cell.rSpan}`;
      icon.appendChild(d);
    });

    const lbl = document.createElement('div');
    lbl.className = 'ml-n'; lbl.textContent = layout.label;

    btn.appendChild(icon); btn.appendChild(lbl);
    btn.addEventListener('click', () => {
      if (layout === currentLayout && !layout.asym) return;
      switchLayout(layout);
      applyLayout(layout);
      mxTrackCount = layout.n;
      buildMixerStrips(mxTrackCount);
      buildMxLayoutBar();
      startMxVuLoop();
      // Sync landing picker selection too
      document.querySelectorAll('#layoutPicker .layout-opt').forEach((b, j) => {
        b.classList.toggle('selected', LAYOUTS[j] === layout);
      });
    });
    bar.appendChild(btn);
  });
}

// ── Bar graph VU loop ─────────────────────────────────────────────────────
const mxDataArr = new Uint8Array(128);
let mxVuRaf = null;
function startMxVuLoop() {
  const loop = () => {
    for (let i = 0; i < mxTrackCount; i++) {
      const s = slots[i];
      const barsEl = document.getElementById(`mx-bars-${i}`);
      if (!barsEl) continue;
      const segs = barsEl.querySelectorAll('.mx-bar-seg');
      let lv = 0;
      if (s && s.analyser) {
        s.analyser.getByteFrequencyData(mxDataArr);
        const avg = mxDataArr.reduce((a, b) => a + b, 0) / mxDataArr.length;
        lv = Math.min(Math.round((avg / 255) * MX_SEGS * 2.2), MX_SEGS);
      }
      segs.forEach((seg, idx) => {
        seg.className = idx < lv
          ? `mx-bar-seg ${idx < 10 ? 'on-lo' : idx < 14 ? 'on-mid' : 'on-hi'}`
          : 'mx-bar-seg';
      });
    }
    mxVuRaf = requestAnimationFrame(loop);
  };
  if (mxVuRaf) cancelAnimationFrame(mxVuRaf);
  loop();
}

// ── Timecode mirror + transport sync (single 80ms tick) ──────────────────
const mxTimecode = document.getElementById('mx-timecode');
const mxBtnRec   = document.getElementById('mxBtnRec');
const mxBtnPlay  = document.getElementById('mxBtnPlay');
const mxBtnExport= document.getElementById('mxBtnExport');
setInterval(() => {
  const src = document.getElementById('timerDisplay');
  if (src && mxTimecode) {
    mxTimecode.textContent = src.textContent.split('/')[0].trim();
    mxTimecode.classList.toggle('active', isRecording || isPlaying);
  }
  mxBtnRec?.classList.toggle('active', isRecording);
  mxBtnPlay?.classList.toggle('active', isPlaying);
  mxBtnExport?.classList.toggle('spinning', isExporting);
}, 80);

document.getElementById('mxBtnRec').addEventListener('click',  () => document.getElementById('btnRecord').click());
document.getElementById('mxBtnPlay').addEventListener('click', () => document.getElementById('btnPlay').click());
document.getElementById('mxBtnStop').addEventListener('click', async () => {
  if (isPlaying) stopPlayback();
  if (isRecording) {
    isRecording = false;
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('mxBtnRec').classList.remove('active');
    await stopRecording();
  }
});
document.getElementById('mxBtnExport').addEventListener('click', exportReel);

// ── Main knobs (EQ / Reverb / Master) ────────────────────────────────────
document.querySelectorAll('.mx-knob').forEach(knob => {
  makeKnobDraggable(knob, v => {
    if (knob.dataset.knob === '2') {
      if (masterGain) masterGain.gain.setTargetAtTime(v * 1.5, audioCtx?.currentTime || 0, 0.02);
    }
  });
});

buildMixerStrips(mxTrackCount);
buildMxLayoutBar();
startMxVuLoop();

const toastEl=document.getElementById('saveToast');
let toastTimer;
function showToast(msg,isError=false){
  toastEl.textContent=msg;
  toastEl.classList.toggle('is-error',isError);
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),3200);
}
