name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Mac universal DMG
        run: npx electron-builder --mac dmg --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Mac DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64 --publish never
      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
